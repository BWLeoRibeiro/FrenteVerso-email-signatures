<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <title>Email Signature – Light</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Space+Grotesk:wght@600&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f3f4f6;
        margin: 0;
        padding: 32px;
        color: #111827;
      }
      h1 {
        font-size: 24px;
        margin: 0 0 24px 0;
      }
      h2 {
        font-size: 18px;
        margin: 32px 0 12px 0;
      }
      .signature-wrapper {
        background: #ffffff;
        border-radius: 8px;
        box-shadow: 0 8px 20px rgba(15, 23, 42, 0.08);
        display: inline-block;
      }
    </style>
  </head>
  <body>
    <h1>Email Signature – Light</h1>

    <h2>Filipe Moreira</h2>
    <div class="signature-wrapper">
      <!-- Email Signature – Light (from Paper design) -->
      <table
        cellpadding="0"
        cellspacing="0"
        border="0"
        style="border-collapse: collapse; width: 600px; background: #ffffff; font-size: 12px; line-height: 16px; -webkit-font-smoothing: antialiased"
      >
        <!-- Accent gradient bar -->
        <tr>
          <td
            colspan="5"
            style="
              height: 3px;
              background: linear-gradient(90deg, #b05a3a 0%, #d4bc6e 33%, #3a8a6a 67%, #3a6b8a 100%);
              font-size: 0;
              line-height: 0;
            "
          ></td>
        </tr>

        <!-- Main content row -->
        <tr>
          <td style="padding: 28px 0 24px 20px; vertical-align: top; width: 140px">
            <!-- Logo + Social column -->
            <table cellpadding="0" cellspacing="0" border="0" style="border-collapse: collapse">
              <tr>
                <td style="padding: 0 0 16px 0">
                  <img
                    src="https://raw.githubusercontent.com/BWLeoRibeiro/FrenteVerso-email-signatures/main/assets/logo-frenteverso.png"
                    width="170"
                    alt="Frente &amp; Verso"
                    style="display: block; border: 0; outline: none; text-decoration: none; width: 170px; height: auto"
                  />
                </td>
              </tr>
              <tr>
                <td>
                  <table cellpadding="0" cellspacing="0" border="0" style="border-collapse: collapse">
                    <tr>
                      <!-- Facebook -->
                      <td style="padding-right: 12px">
                        <a href="https://www.facebook.com/frenteverso" style="text-decoration: none">
                          <!--[if mso]>
                          <img src="cid:fb-icon" width="16" height="16" alt="Facebook" />
                          <![endif]-->
                          <!--[if !mso]><!-->
                          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#999999" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
                            <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z" />
                          </svg>
                          <!--<![endif]-->
                        </a>
                      </td>
                      <!-- Instagram -->
                      <td style="padding-right: 12px">
                        <a href="https://www.instagram.com/frenteverso" style="text-decoration: none">
                          <!--[if mso]>
                          <img src="cid:ig-icon" width="16" height="16" alt="Instagram" />
                          <![endif]-->
                          <!--[if !mso]><!-->
                          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#999999" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
                            <rect width="20" height="20" x="2" y="2" rx="5" ry="5" />
                            <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z" />
                            <line x1="17.5" x2="17.51" y1="6.5" y2="6.5" />
                          </svg>
                          <!--<![endif]-->
                        </a>
                      </td>
                      <!-- Email -->
                      <td>
                        <a href="mailto:geral@frenteverso.pt" style="text-decoration: none">
                          <!--[if mso]>
                          <img src="cid:mail-icon" width="16" height="16" alt="Email" />
                          <![endif]-->
                          <!--[if !mso]><!-->
                          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#999999" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
                            <rect width="20" height="16" x="2" y="4" rx="2" />
                            <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
                          </svg>
                          <!--<![endif]-->
                        </a>
                      </td>
                    </tr>
                  </table>
                </td>
              </tr>
            </table>
          </td>

          <!-- Spacing before divider -->
          <td style="width: 28px"></td>

          <!-- Vertical divider -->
          <td style="width: 1px; background: #e3d7c8; font-size: 0; line-height: 0">&nbsp;</td>

          <!-- Spacing after divider -->
          <td style="width: 28px"></td>

          <!-- Info column -->
          <td style="padding: 28px 40px 24px 0; vertical-align: top">
            <table cellpadding="0" cellspacing="0" border="0" style="border-collapse: collapse">
              <!-- Name -->
              <tr>
                <td
                  style="
                    font-family: 'Space Grotesk', system-ui, sans-serif;
                    font-size: 16px;
                    font-weight: 600;
                    line-height: 20px;
                    color: #15120e;
                    padding: 0 0 2px 0;
                  "
                >
                  Filipe Moreira
                </td>
              </tr>
              <!-- Role -->
              <tr>
                <td
                  style="
                    font-family: Inter, system-ui, sans-serif;
                    font-size: 13px;
                    line-height: 16px;
                    color: #9c8f80;
                    padding: 0 0 14px 0;
                  "
                >
                  CEO
                </td>
              </tr>

              <!-- Phone -->
              <tr>
                <td style="padding: 0 0 4px 0">
                  <table cellpadding="0" cellspacing="0" border="0" style="border-collapse: collapse">
                    <tr>
                      <td style="vertical-align: middle; padding-right: 8px; line-height: 0">
                        <!--[if !mso]><!-->
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#C45A3B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
                          <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.35 13.45 19.79 19.79 0 0 1 1.17 4.82a2 2 0 0 1 1.99-2.18h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.39 9.91a16 16 0 0 0 6.7 6.7l1.46-1.46a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z" />
                        </svg>
                        <!--<![endif]-->
                      </td>
                      <td
                        style="
                          font-family: Inter, system-ui, sans-serif;
                          font-size: 12px;
                          line-height: 16px;
                          color: #555555;
                          white-space: nowrap;
                        "
                      >
                        <a href="tel:+351229515726" style="color: #555555; text-decoration: none">229 515 726</a>
                      </td>
                    </tr>
                  </table>
                </td>
              </tr>

              <!-- Email -->
              <tr>
                <td style="padding: 0 0 4px 0">
                  <table cellpadding="0" cellspacing="0" border="0" style="border-collapse: collapse">
                    <tr>
                      <td style="vertical-align: middle; padding-right: 8px; line-height: 0">
                        <!--[if !mso]><!-->
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#C45A3B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
                          <rect width="20" height="16" x="2" y="4" rx="2" />
                          <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
                        </svg>
                        <!--<![endif]-->
                      </td>
                      <td
                        style="
                          font-family: Inter, system-ui, sans-serif;
                          font-size: 12px;
                          line-height: 16px;
                          color: #555555;
                          white-space: nowrap;
                        "
                      >
                        <a href="mailto:filipe.moreira@frenteverso.pt" style="color: #555555; text-decoration: none"
                          >filipe.moreira@frenteverso.pt</a
                        >
                      </td>
                    </tr>
                  </table>
                </td>
              </tr>

              <!-- Website -->
              <tr>
                <td style="padding: 0 0 4px 0">
                  <table cellpadding="0" cellspacing="0" border="0" style="border-collapse: collapse">
                    <tr>
                      <td style="vertical-align: middle; padding-right: 8px; line-height: 0">
                        <!--[if !mso]><!-->
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#C45A3B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
                          <circle cx="12" cy="12" r="10" />
                          <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" />
                          <line x1="2" y1="12" x2="22" y2="12" />
                        </svg>
                        <!--<![endif]-->
                      </td>
                      <td
                        style="
                          font-family: Inter, system-ui, sans-serif;
                          font-size: 12px;
                          line-height: 16px;
                          color: #555555;
                          white-space: nowrap;
                        "
                      >
                        <a href="https://www.frenteverso.pt" style="color: #555555; text-decoration: none"
                          >www.frenteverso.pt</a
                        >
                      </td>
                    </tr>
                  </table>
                </td>
              </tr>

              <!-- Address -->
              <tr>
                <td style="padding: 0">
                  <table cellpadding="0" cellspacing="0" border="0" style="border-collapse: collapse">
                    <tr>
                      <td style="vertical-align: middle; padding-right: 8px; line-height: 0">
                        <!--[if !mso]><!-->
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#C45A3B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
                          <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z" />
                          <circle cx="12" cy="10" r="3" />
                        </svg>
                        <!--<![endif]-->
                      </td>
                      <td
                        style="
                          font-family: Inter, system-ui, sans-serif;
                          font-size: 12px;
                          line-height: 16px;
                          color: #555555;
                          white-space: nowrap;
                        "
                      >
                        Rua Nova do Seixo, 1150 &mdash; S. Mamede Infesta
                      </td>
                    </tr>
                  </table>
                </td>
              </tr>
            </table>
          </td>
        </tr>

        <!-- Services strip -->
        <tr>
          <td
            colspan="5"
            style="background: #f5f2ed; padding: 10px 28px; text-align: center"
          >
            <table
              cellpadding="0"
              cellspacing="0"
              border="0"
              style="border-collapse: collapse; margin: 0 auto"
            >
              <tr>
                <!-- Impressao -->
                <td style="vertical-align: middle; padding-right: 16px">
                  <table cellpadding="0" cellspacing="0" border="0" style="border-collapse: collapse">
                    <tr>
                      <td style="vertical-align: middle; padding-right: 6px; line-height: 0">
                        <!--[if !mso]><!-->
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#CD5061" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
                          <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2" />
                          <path d="M6 9V3a1 1 0 0 1 1-1h10a1 1 0 0 1 1 1v6" />
                          <rect x="6" y="14" width="12" height="8" rx="1" />
                        </svg>
                        <!--<![endif]-->
                      </td>
                      <td
                        style="
                          font-family: 'Space Grotesk', system-ui, sans-serif;
                          font-size: 9px;
                          font-weight: 600;
                          letter-spacing: 1.5px;
                          line-height: 12px;
                          color: #666666;
                          white-space: nowrap;
                        "
                      >
                        IMPRESS&Atilde;O
                      </td>
                    </tr>
                  </table>
                </td>
                <!-- Estampagem -->
                <td style="vertical-align: middle; padding-right: 16px">
                  <table cellpadding="0" cellspacing="0" border="0" style="border-collapse: collapse">
                    <tr>
                      <td style="vertical-align: middle; padding-right: 6px; line-height: 0">
                        <!--[if !mso]><!-->
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#EDCF73" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
                          <path d="M7 11h10" />
                          <path d="M7 7h6" />
                          <rect x="2" y="2" width="20" height="20" rx="2" />
                          <path d="M14 17h3" />
                          <path d="M14 13h3" />
                        </svg>
                        <!--<![endif]-->
                      </td>
                      <td
                        style="
                          font-family: 'Space Grotesk', system-ui, sans-serif;
                          font-size: 9px;
                          font-weight: 600;
                          letter-spacing: 1.5px;
                          line-height: 12px;
                          color: #666666;
                          white-space: nowrap;
                        "
                      >
                        ESTAMPAGEM
                      </td>
                    </tr>
                  </table>
                </td>
                <!-- Publicidade -->
                <td style="vertical-align: middle; padding-right: 16px">
                  <table cellpadding="0" cellspacing="0" border="0" style="border-collapse: collapse">
                    <tr>
                      <td style="vertical-align: middle; padding-right: 6px; line-height: 0">
                        <!--[if !mso]><!-->
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#009C75" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
                          <path d="m3 11 19-9-9 19-2-8-8-2z" />
                        </svg>
                        <!--<![endif]-->
                      </td>
                      <td
                        style="
                          font-family: 'Space Grotesk', system-ui, sans-serif;
                          font-size: 9px;
                          font-weight: 600;
                          letter-spacing: 1.5px;
                          line-height: 12px;
                          color: #666666;
                          white-space: nowrap;
                        "
                      >
                        PUBLICIDADE
                      </td>
                    </tr>
                  </table>
                </td>
                <!-- Design -->
                <td style="vertical-align: middle">
                  <table cellpadding="0" cellspacing="0" border="0" style="border-collapse: collapse">
                    <tr>
                      <td style="vertical-align: middle; padding-right: 6px; line-height: 0">
                        <!--[if !mso]><!-->
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#257C93" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">

                          <circle cx="17.5" cy="10.5" r=".5" />
                          <circle cx="8.5" cy="7.5" r=".5" />
                          <circle cx="6.5" cy="12.5" r=".5" />
                          <path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125c-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z" />
                        </svg>
                        <!--<![endif]-->
                      </td>
                      <td
                        style="
                          font-family: 'Space Grotesk', system-ui, sans-serif;
                          font-size: 9px;
                          font-weight: 600;
                          letter-spacing: 1.5px;
                          line-height: 12px;
                          color: #666666;
                          white-space: nowrap;
                        "
                      >
                        DESIGN

  </body>
</html>
